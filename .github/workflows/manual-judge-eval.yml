# Ad-hoc LLM-as-judge eval — workflow_dispatch only (not a PR gate).
# Actions → Manual Judge Eval → Run workflow

name: Manual Judge Eval

on:
  workflow_dispatch:
    inputs:
      obs_backend:
        description: OBS_BACKEND (none or langsmith)
        required: true
        default: none
        type: choice
        options:
          - none
          - langsmith

jobs:
  judge-eval:
    name: manual judge eval
    runs-on: ubuntu-latest
    env:
      OBS_BACKEND: ${{ inputs.obs_backend }}
      LOG_TRIAGE_DEFAULT_PROMPT_VERSION: v3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev,obs]"

      - name: Require API key for CI model
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LOG_TRIAGE_DEFAULT_MODEL: ${{ vars.LOG_TRIAGE_CI_MODEL || 'gpt-4o-mini' }}
        run: |
          MODEL="${LOG_TRIAGE_DEFAULT_MODEL:-gpt-4o-mini}"
          echo "Judge/triage CI model: $MODEL"
          if [[ "$MODEL" == claude* ]] || [[ "$MODEL" == anthropic* ]]; then
            if [ -z "$ANTHROPIC_API_KEY" ]; then
              echo "::error::ANTHROPIC_API_KEY secret required for Claude models"
              exit 1
            fi
          else
            if [ -z "$OPENAI_API_KEY" ]; then
              echo "::error::OPENAI_API_KEY secret required for OpenAI models"
              exit 1
            fi
          fi

      - name: Run pytest judge
        env:
          OBS_BACKEND: ${{ inputs.obs_backend }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LOG_TRIAGE_DEFAULT_MODEL: ${{ vars.LOG_TRIAGE_CI_MODEL || 'gpt-4o-mini' }}
        run: pytest tests/test_judge.py -m judge -v --tb=short

      - name: Upload judge report
        uses: actions/upload-artifact@v4
        with:
          name: judge-eval-report
          path: |
            docs/eval-runs/judge-latest.json
            docs/eval-runs/judge-*.json
