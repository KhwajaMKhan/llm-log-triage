# Ad-hoc LLM-as-judge eval — workflow_dispatch only (not a PR gate).
# Actions → Manual Judge Eval → Run workflow

name: Manual Judge Eval

on:
  workflow_dispatch:
    inputs:
      obs_backend:
        description: OBS_BACKEND (none or langsmith)
        required: true
        default: none
        type: choice
        options:
          - none
          - langsmith

jobs:
  judge-eval:
    name: manual judge eval
    runs-on: ubuntu-latest
    env:
      OBS_BACKEND: ${{ inputs.obs_backend }}
      LOG_TRIAGE_DEFAULT_PROMPT_VERSION: v3
      LOG_TRIAGE_DEFAULT_MODEL: ${{ vars.LOG_TRIAGE_CI_MODEL || 'gpt-4o-mini' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev,obs]"

      - name: Require API key for CI model
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LOG_TRIAGE_DEFAULT_MODEL: ${{ env.LOG_TRIAGE_DEFAULT_MODEL }}
        run: |
          echo "CI model (triage + judge default): $LOG_TRIAGE_DEFAULT_MODEL"
          if [[ "$LOG_TRIAGE_DEFAULT_MODEL" == claude* ]] || [[ "$LOG_TRIAGE_DEFAULT_MODEL" == anthropic* ]]; then
            if [ -z "$ANTHROPIC_API_KEY" ]; then
              echo "::error::ANTHROPIC_API_KEY secret required when LOG_TRIAGE_CI_MODEL is a Claude model"
              exit 1
            fi
          else
            if [ -z "$OPENAI_API_KEY" ]; then
              echo "::error::OPENAI_API_KEY secret required when LOG_TRIAGE_CI_MODEL is an OpenAI model (default gpt-4o-mini)"
              exit 1
            fi
          fi

      - name: Run pytest judge
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LOG_TRIAGE_DEFAULT_MODEL: ${{ env.LOG_TRIAGE_DEFAULT_MODEL }}
        run: pytest tests/test_judge.py -m judge -v --tb=short

      - name: Upload judge report
        uses: actions/upload-artifact@v4
        with:
          name: judge-eval-report
          path: |
            docs/eval-runs/judge-latest.json
            docs/eval-runs/judge-*.json
