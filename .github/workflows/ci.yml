# Free CI — no LLM API keys required.
# Pair with eval-gate.yml for merge-blocking eval. Branch protection:
#   Require status checks: "test (free)" AND "eval (golden-set)"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-free:
    name: test (free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run deterministic tests (no LLM, no judge)
        run: pytest tests/ -m "not llm" -v --tb=short
